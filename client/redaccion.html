<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Redacción | Farol Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center my-6 border-b border-gray-700 pb-4">
            <h1 class="text-2xl font-bold">🐂 Redacción Farol</h1>
            <button onclick="location.href='/activar-toro'" class="bg-blue-600 px-4 py-2 rounded text-sm font-bold">Generar Noticia</button>
        </header>

        <div class="bg-gray-800 rounded-lg shadow-xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-700 text-xs uppercase text-gray-400">
                    <tr>
                        <th class="p-3">Título</th>
                        <th class="p-3">Categoría</th>
                        <th class="p-3">Acción</th>
                    </tr>
                </thead>
                <tbody id="lista" class="text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function cargar() {
            const res = await fetch('/api/admin/listado');
            const noticias = await res.json();
            document.getElementById('lista').innerHTML = noticias.map(n => `
                <tr class="border-b border-gray-700">
                    <td class="p-3 font-medium">${n.titulo}</td>
                    <td class="p-3"><span class="bg-blue-900 px-2 py-1 rounded text-xs">${n.categoria}</span></td>
                    <td class="p-3">
                        <button onclick="borrar(${n.id})" class="text-red-500 font-bold">Borrar</button>
                    </td>
                </tr>
            `).join('');
        }

        async function borrar(id) {
            if(confirm('¿Seguro socio?')) {
                await fetch(`/api/admin/borrar/${id}`, { method: 'DELETE' });
                cargar();
            }
        }
        cargar();
    </script>
</body>
</html>

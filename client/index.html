<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farol Tech & Negocios | El Toro de la Economía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; }
        .ads-placeholder { background: #1a1a1a; border: 1px dashed #333; height: 90px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
    </style>
</head>
<body>
    <header class="p-6 border-b border-gray-800 flex justify-between items-center bg-black sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="/static/logo-tech.png" alt="Toro" class="w-12">
            <h1 class="text-2xl font-bold text-white uppercase tracking-widest">Farol <span class="text-blue-500">Tech</span></h1>
        </div>
        <nav class="hidden md:flex gap-6 text-sm font-semibold uppercase">
            <a href="#" class="hover:text-blue-500">Tecnología</a>
            <a href="#" class="hover:text-blue-500">Economía</a>
            <a href="#" class="hover:text-blue-500">Mercados</a>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div class="ads-placeholder font-mono text-xs text-gray-600">ANUNCIO ADSENSE SUPERIOR</div>

        <section id="noticias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-6">
            </section>

        <div class="ads-placeholder font-mono text-xs text-gray-600">ANUNCIO ADSENSE INFERIOR</div>
    </main>

    <footer class="p-10 border-t border-gray-800 mt-10 text-center text-gray-500 text-sm">
        <p>© 2026 Farol Tech & Negocios. Grupo Farol.</p>
    </footer>

    <script>
        async function cargarNoticias() {
            const res = await fetch('/api/noticias');
            const noticias = await res.json();
            const container = document.getElementById('noticias');
            
            if(noticias.length === 0) {
                container.innerHTML = "<p class='col-span-full text-center py-10'>🐂 El Toro está preparando las noticias de hoy...</p>";
                return;
            }

            container.innerHTML = noticias.map(n => `
                <article class="bg-[#111] border border-gray-800 rounded-lg overflow-hidden hover:border-blue-500 transition">
                    <div class="p-6">
                        <span class="text-blue-500 text-xs font-bold uppercase">${n.categoria || 'Actualidad'}</span>
                        <h2 class="text-xl font-bold mt-2 leading-tight">${n.titulo}</h2>
                        <p class="text-gray-400 text-sm mt-3">${n.resumen}</p>
                        <button class="mt-4 text-white font-bold border-b-2 border-blue-500 pb-1 text-sm">Leer más</button>
                    </div>
                </article>
            `).join('');
        }
        cargarNoticias();
    </script>
</body>
</html>

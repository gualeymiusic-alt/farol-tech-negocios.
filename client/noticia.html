<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia | Farol Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-gray-200">
    <nav class="p-6 border-b border-gray-800 bg-black">
        <a href="/" class="text-blue-500 font-bold">← VOLVER AL INICIO</a>
    </nav>
    <main class="max-w-4xl mx-auto p-6">
        <div id="contenido-noticia" class="mt-10">
            <p class="text-center py-20">Cargando análisis del Toro... 🐂</p>
        </div>
        <div class="h-60 bg-[#111] border border-dashed border-gray-700 my-10 flex items-center justify-center text-xs text-gray-600">ANUNCIO ADSENSE DENTRO DE NOTICIA</div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('v');

        async function cargarDetalle() {
            const res = await fetch(`/api/noticia/${slug}`);
            const n = await res.json();
            document.getElementById('contenido-noticia').innerHTML = `
                <span class="text-blue-500 font-bold uppercase text-sm">${n.categoria}</span>
                <h1 class="text-4xl font-extrabold text-white mt-2 leading-tight">${n.titulo}</h1>
                <div class="mt-8 prose prose-invert max-w-none text-lg leading-relaxed">
                    ${n.contenido_html}
                </div>
            `;
            document.title = n.titulo + " | Farol Tech";
        }
        if(slug) cargarDetalle();
    </script>
</body>
</html>
